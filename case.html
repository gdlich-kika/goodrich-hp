<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>物件一覧</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
   <a href="index.html" class="header-logo">
  <img src="logo_goodrich.png" alt="株式会社GOODRICH" class="logo-img">
</a>
    <nav class="header-nav">
      <a href="index.html">トップ</a>
      <a href="#">サービス</a>
      <a href="case.html">物件一覧</a>
      <a href="contact.html">お問い合わせ</a>
    </nav>
  </header>

  <div class="page-header">
    <h1>物件一覧</h1>
    <p>GOODRICHが厳選した物件をご紹介します。</p>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="filterCards('all', this)">すべて</button>
    <button class="filter-btn" onclick="filterCards('新着', this)">新着</button>
  </div>

  <div class="cards-wrap">

    <a href="case-detail.html" class="card-link-wrap">
     <div class="case-card" data-industry="新着" data-area="東京23区" data-type="中古マンション">
        <img src="images/koishikawa1.jpg" alt="施工事例写真">
        <span class="tag">新着</span>
        <p class="card-company">東京都文京区</p>
        <p class="card-title">小石川パーソナルハウス702</p>
        <p class="card-result">50.68㎡ · 1LDK · <span class="num">4,630万円</span></p>
      </div>
    </a>

     <a href="case-detail2.html" class="card-link-wrap">
      <div class="case-card" data-industry="新着" data-area="神奈川県" data-type="中古マンション">
        <img src="images/kawasaki1.jpg" alt="川崎パークホームズ803">
        <span class="tag">新着</span>
        <p class="card-company">神奈川県川崎市</p>
        <p class="card-title">川崎パークホームズ803</p>
        <p class="card-result">61.39㎡ · 3LDK · <span class="num">6,480万円</span></p>
      </div>
    </a>
  </div>

 <script>
  function filterCards(industry, btn) {
    document.querySelectorAll('.filter-btn').forEach(function(b) {
      b.classList.remove('active');
    });
    btn.classList.add('active');
    applyFilters();
  }

  function applyFilters() {
    const activeBtn = document.querySelector('.filter-btn.active');
    const industry = activeBtn ? activeBtn.dataset.filter : 'all';
    const params = new URLSearchParams(window.location.search);
    const area = params.get('area');
    const type = params.get('type');

    document.querySelectorAll('.case-card').forEach(function(card) {
      const matchIndustry = industry === 'all' || card.dataset.industry === industry;
      const matchArea = !area || card.dataset.area === area;
      const matchType = !type || card.dataset.type === type;
      card.style.display = (matchIndustry && matchArea && matchType) ? '' : 'none';
    });
  }

  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.dataset.filter = btn.textContent.trim() === 'すべて' ? 'all' : btn.textContent.trim();
  });

  window.onload = applyFilters;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>お問い合わせ | 株式会社GOODRICH</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <a href="index.html" class="header-logo">株式会社GOODRICH</a>
    <nav class="header-nav">
      <a href="index.html">トップ</a>
      <a href="#">サービス</a>
      <a href="case.html">物件一覧</a>
      <a href="contact.html">お問い合わせ</a>
    </nav>
  </header>

  <div class="contact-hero">
    <div class="contact-hero-overlay">
      <h1 class="contact-hero-title">お問い合わせ</h1>
      <p class="contact-hero-sub">物件のご相談・内見のご予約はお気軽にどうぞ</p>
    </div>
  </div>

  <div class="contact-wrap">

    <div class="contact-grid">

      <div class="contact-info">
        <h2 class="contact-info-title">会社情報</h2>
        <div class="contact-info-item">
          <div class="contact-info-label">会社名</div>
          <div class="contact-info-value">株式会社グッドリッチ</div>
        </div>
        <div class="contact-info-item">
          <div class="contact-info-label">電話番号</div>
          <div class="contact-info-value">
            <a href="tel:0368050883" class="contact-tel">03-6805-0883</a>
          </div>
        </div>
        <div class="contact-info-item">
          <div class="contact-info-label">住所</div>
          <div class="contact-info-value">
            〒103-0022<br>
            東京都中央区日本橋室町1-8-8-4階
          </div>
        </div>
        <div class="contact-info-item">
          <div class="contact-info-label">営業時間</div>
          <div class="contact-info-value">
            平日 9:00〜18:00<br>
            <span style="font-size:12px; color:#888;">土日祝はお問い合わせフォームをご利用ください</span>
          </div>
        </div>

        <div class="contact-map">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3240.7!2d139.7744!3d35.6864!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x60188bfd86f4ae9b%3A0x9c7a8b8b8b8b8b8b!2z5p2x5Lqs6YO95Lit5aSu5Yy65pel5pys5qmL5a6k55S677yR4oiS77yY4oiS77yY!5e0!3m2!1sja!2sjp"
            width="100%"
            height="200"
            style="border:0; border-radius:8px; display:block;"
            allowfullscreen=""
            loading="lazy">
          </iframe>
        </div>
      </div>

      <div class="contact-form-wrap">
        <h2 class="contact-info-title">お問い合わせフォーム</h2>
        <p class="contact-form-note">※送信後、担当者より2営業日以内にご連絡いたします。</p>

        <form class="contact-form" onsubmit="submitForm(event)">

          <div class="form-group">
            <label class="form-label">お名前 <span class="required">必須</span></label>
            <input type="text" class="form-input" placeholder="山田 太郎" required>
          </div>

          <div class="form-group">
            <label class="form-label">電話番号 <span class="required">必須</span></label>
            <input type="tel" class="form-input" placeholder="090-0000-0000" required>
          </div>

          <div class="form-group">
            <label class="form-label">メールアドレス <span class="required">必須</span></label>
            <input type="email" class="form-input" placeholder="example@email.com" required>
          </div>

          <div class="form-group">
            <label class="form-label">希望物件タイプ</label>
            <select class="form-input">
              <option value="">選択してください</option>
              <option>マンション</option>
              <option>一戸建て</option>
              <option>土地</option>
              <option>投資物件</option>
              <option>その他</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">お問い合わせ内容 <span class="required">必須</span></label>
            <textarea class="form-textarea" placeholder="物件についてのご質問・内見のご希望などお気軽にご記入ください" required></textarea>
          </div>

          <button type="submit" class="form-submit">送信する</button>

        </form>
      </div>

    </div>

  </div>

  <script>
    function submitForm(e) {
      e.preventDefault();
      alert('お問い合わせありがとうございます。担当者より2営業日以内にご連絡いたします。');
    }
  </script>

</body>
</html>
